<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEBRAS Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0a0a0a;
            color: #e5e5e5;
        }
        #app { min-height: 100vh; }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 240px;
            height: 100vh;
            background: #1a1a1a;
            border-right: 1px solid #2a2a2a;
            padding: 20px;
        }
        .sidebar h1 {
            font-size: 20px;
            margin-bottom: 30px;
            color: #a78bfa;
        }
        .nav-btn {
            width: 100%;
            padding: 12px 16px;
            background: transparent;
            border: none;
            color: #a0a0a0;
            text-align: left;
            cursor: pointer;
            border-radius: 6px;
            margin-bottom: 4px;
            transition: all 0.2s;
        }
        .nav-btn:hover { background: #2a2a2a; color: #e5e5e5; }
        .nav-btn.active { background: #2a2a2a; color: #a78bfa; }

        /* Main content */
        .main {
            margin-left: 240px;
            padding: 30px;
        }

        /* Cards */
        .card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: linear-gradient(135deg, #1a1a1a 0%, #2a1a3a 100%);
            border: 1px solid #3a2a4a;
            border-radius: 12px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .stat-card:hover {
            border-color: #a78bfa;
            transform: translateY(-2px);
        }
        .stat-card h3 { font-size: 32px; margin: 8px 0; }
        .stat-card p { color: #888; }

        /* Grid */
        .grid { display: grid; gap: 20px; }
        .grid-3 { grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #2a2a2a;
        }
        th { color: #888; font-weight: 500; font-size: 12px; text-transform: uppercase; }
        tr:hover { background: #1a1a1a; }

        /* Buttons */
        button {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #a78bfa;
            color: #000;
        }
        .btn-primary:hover { background: #9370db; }
        .btn-danger {
            background: #ef4444;
            color: #fff;
        }
        .btn-danger:hover { background: #dc2626; }
        .btn-secondary {
            background: #2a2a2a;
            color: #e5e5e5;
        }
        .btn-secondary:hover { background: #3a3a3a; }

        /* Input */
        input, select, textarea {
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            color: #e5e5e5;
            padding: 8px 12px;
            border-radius: 6px;
            width: 100%;
            margin-top: 8px;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #a78bfa;
        }
        label {
            display: block;
            margin-top: 16px;
            color: #888;
            font-size: 14px;
        }

        /* Toggle */
        .toggle {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        .toggle input { display: none; }
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #3a3a3a;
            transition: 0.3s;
            border-radius: 24px;
        }
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background: #e5e5e5;
            transition: 0.3s;
            border-radius: 50%;
        }
        input:checked + .toggle-slider { background: #a78bfa; }
        input:checked + .toggle-slider:before { transform: translateX(20px); }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal {
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            border-radius: 12px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
        }
        .modal h3 { margin-bottom: 20px; }
        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            justify-content: flex-end;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            padding: 16px 20px;
            border-radius: 8px;
            z-index: 2000;
            animation: slideIn 0.3s;
        }
        .toast.success { border-color: #10b981; }
        .toast.error { border-color: #ef4444; }
        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Utilities */
        .flex { display: flex; }
        .gap-2 { gap: 8px; }
        .gap-4 { gap: 16px; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .mt-4 { margin-top: 16px; }
        .text-sm { font-size: 14px; }
        .text-gray { color: #888; }
        code {
            background: #2a2a2a;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script type="module">
        import { html, render, Component } from 'https://esm.sh/htm/preact/standalone';

        // API helper
        const api = {
            async get(url) {
                const res = await fetch(url);
                return res.json();
            },
            async post(url, data) {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                return res.json();
            },
            async patch(url, data) {
                const res = await fetch(url, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                return res.json();
            },
            async delete(url) {
                const res = await fetch(url, { method: 'DELETE' });
                return res.json();
            },
            async put(url, data) {
                const res = await fetch(url, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                return res.json();
            }
        };

        // Toast component
        class Toast extends Component {
            state = { toasts: [] };

            show(message, type = 'info') {
                const id = Date.now();
                this.setState({ toasts: [...this.state.toasts, { id, message, type }] });
                setTimeout(() => this.remove(id), 3000);
            }

            remove(id) {
                this.setState({ toasts: this.state.toasts.filter(t => t.id !== id) });
            }

            render() {
                return html`
                    <div>
                        ${this.state.toasts.map(t => html`
                            <div key=${t.id} class="toast ${t.type}">
                                ${t.message}
                            </div>
                        `)}
                    </div>
                `;
            }
        }

        // Main App
        class App extends Component {
            state = {
                page: 'dashboard',
                stats: {},
                rules: [],
                channels: [],
                selectedChannel: null,
                channelRules: null,
                inviteSettings: {},
                showModal: false,
                newRule: {}
            };

            async componentDidMount() {
                await this.loadStats();
                await this.loadChannels();
            }

            toast(msg, type) {
                this.toastRef.show(msg, type);
            }

            async loadStats() {
                const stats = await api.get('/api/v1/stats');
                this.setState({ stats });
            }

            async loadRules() {
                const rules = await api.get('/api/v1/autoresponder/rules?limit=1000');
                this.setState({ rules });
            }

            async loadChannels() {
                const channels = await api.get('/api/v1/channels');
                this.setState({ channels });
            }

            async loadChannelRules(channelId) {
                const channelRules = await api.get(`/api/v1/rules/${channelId}`);
                this.setState({
                    channelRules: channelRules || {
                        channel_id: channelId,
                        allow_bots: true,
                        allow_top_level_posts: true,
                        allow_thread_replies: true
                    }
                });
            }

            async loadInviteSettings() {
                const inviteSettings = await api.get('/api/v1/invite/settings');
                this.setState({ inviteSettings: inviteSettings || {} });
            }

            async toggleRule(id, enabled) {
                await api.patch(`/api/v1/autoresponder/rules/${id}`, { enabled: !enabled });
                await this.loadRules();
                this.toast('Rule updated', 'success');
            }

            async deleteRule(id) {
                if (!confirm('Delete this rule?')) return;
                await api.delete(`/api/v1/autoresponder/rules/${id}`);
                await this.loadRules();
                this.toast('Rule deleted', 'success');
            }

            async addRule() {
                await api.post('/api/v1/autoresponder/rules', this.state.newRule);
                this.setState({ showModal: false, newRule: {} });
                await this.loadRules();
                this.toast('Rule created', 'success');
            }

            async saveChannelRules() {
                const { selectedChannel, channelRules } = this.state;
                await api.put(`/api/v1/rules/${selectedChannel}`, channelRules);
                this.toast('Channel rules saved', 'success');
            }

            async saveInviteSettings() {
                await api.put('/api/v1/invite/settings', this.state.inviteSettings);
                this.toast('Invite settings saved', 'success');
            }

            selectChannel(channelId) {
                this.setState({ selectedChannel: channelId });
                this.loadChannelRules(channelId);
            }

            renderDashboard() {
                const { stats } = this.state;
                return html`
                    <div>
                        <h2 style="font-size: 28px; margin-bottom: 24px;">Dashboard</h2>
                        <div class="grid grid-3">
                            <div class="stat-card" onClick=${() => this.setState({ page: 'autoresponder' }, () => this.loadRules())}>
                                <p>Auto Response Rules</p>
                                <h3>${stats.autoresponder?.total_rules || 0}</h3>
                                <div class="text-sm text-gray">
                                    ${stats.autoresponder?.active_rules || 0} active ·
                                    ${stats.autoresponder?.global_rules || 0} global
                                </div>
                            </div>

                            <div class="stat-card" onClick=${() => this.setState({ page: 'rules' })}>
                                <p>Channel Rules</p>
                                <h3>${stats.channels?.with_rules || 0}</h3>
                                <div class="text-sm text-gray">Channels configured</div>
                            </div>

                            <div class="stat-card" onClick=${() => this.setState({ page: 'invite' }, () => this.loadInviteSettings())}>
                                <p>Invite Helper</p>
                                <h3>${stats.invite?.configured ? 'ON' : 'OFF'}</h3>
                                <div class="text-sm text-gray">
                                    ${stats.invite?.configured ? 'Configured' : 'Not configured'}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }

            renderAutoresponder() {
                const { rules, showModal, newRule } = this.state;
                return html`
                    <div>
                        <div class="flex justify-between items-center" style="margin-bottom: 24px;">
                            <h2 style="font-size: 28px;">Auto Responder</h2>
                            <button class="btn-primary" onClick=${() => this.setState({ showModal: true })}>
                                + Add Rule
                            </button>
                        </div>

                        <div class="card">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Enabled</th>
                                        <th>Phrase</th>
                                        <th>Response</th>
                                        <th>Match</th>
                                        <th>Scope</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${rules.map(r => html`
                                        <tr key=${r.id}>
                                            <td>
                                                <label class="toggle">
                                                    <input type="checkbox" checked=${r.enabled}
                                                        onChange=${() => this.toggleRule(r.id, r.enabled)} />
                                                    <span class="toggle-slider"></span>
                                                </label>
                                            </td>
                                            <td><code>${r.phrase}</code></td>
                                            <td><code>${r.response_text}</code></td>
                                            <td>${r.match_type}</td>
                                            <td>${r.channel_id ? `#${this.state.channels.find(c => c.id === r.channel_id)?.name || r.channel_id}` : 'Global'}</td>
                                            <td>
                                                <button class="btn-danger" onClick=${() => this.deleteRule(r.id)}>
                                                    Delete
                                                </button>
                                            </td>
                                        </tr>
                                    `)}
                                </tbody>
                            </table>
                        </div>

                        ${showModal && html`
                            <div class="modal-overlay" onClick=${() => this.setState({ showModal: false })}>
                                <div class="modal" onClick=${e => e.stopPropagation()}>
                                    <h3>Add Auto Response Rule</h3>

                                    <label>Phrase</label>
                                    <input type="text" value=${newRule.phrase || ''}
                                        onInput=${e => this.setState({ newRule: { ...newRule, phrase: e.target.value } })} />

                                    <label>Response</label>
                                    <textarea rows="3" value=${newRule.response_text || ''}
                                        onInput=${e => this.setState({ newRule: { ...newRule, response_text: e.target.value } })}></textarea>

                                    <label>Match Type</label>
                                    <select value=${newRule.match_type || 'contains'}
                                        onChange=${e => this.setState({ newRule: { ...newRule, match_type: e.target.value } })}>
                                        <option value="contains">Contains</option>
                                        <option value="exact">Exact</option>
                                        <option value="regex">Regex</option>
                                    </select>

                                    <div class="modal-actions">
                                        <button class="btn-secondary" onClick=${() => this.setState({ showModal: false })}>
                                            Cancel
                                        </button>
                                        <button class="btn-primary" onClick=${() => this.addRule()}>
                                            Add Rule
                                        </button>
                                    </div>
                                </div>
                            </div>
                        `}
                    </div>
                `;
            }

            renderRules() {
                const { channels, selectedChannel, channelRules } = this.state;
                const channel = channels.find(c => c.id === selectedChannel);

                return html`
                    <div>
                        <h2 style="font-size: 28px; margin-bottom: 24px;">Channel Rules</h2>

                        <div class="grid" style="grid-template-columns: 300px 1fr;">
                            <div class="card">
                                <h3 style="margin-bottom: 16px;">Channels</h3>
                                ${channels.map(c => html`
                                    <button key=${c.id} class="nav-btn ${selectedChannel === c.id ? 'active' : ''}"
                                        onClick=${() => this.selectChannel(c.id)}>
                                        # ${c.name}
                                    </button>
                                `)}
                            </div>

                            <div>
                                ${channelRules ? html`
                                    <div class="card">
                                        <h3 style="margin-bottom: 16px;"># ${channel?.name}</h3>

                                        <label class="flex items-center gap-2">
                                            <input type="checkbox" checked=${channelRules.allow_bots}
                                                onChange=${e => this.setState({ channelRules: { ...channelRules, allow_bots: e.target.checked } })} />
                                            Allow bot messages
                                        </label>

                                        <label class="flex items-center gap-2">
                                            <input type="checkbox" checked=${channelRules.allow_top_level_posts}
                                                onChange=${e => this.setState({ channelRules: { ...channelRules, allow_top_level_posts: e.target.checked } })} />
                                            Allow top-level posts
                                        </label>

                                        <label class="flex items-center gap-2">
                                            <input type="checkbox" checked=${channelRules.allow_thread_replies}
                                                onChange=${e => this.setState({ channelRules: { ...channelRules, allow_thread_replies: e.target.checked } })} />
                                            Allow thread replies
                                        </label>

                                        <div class="mt-4">
                                            <button class="btn-primary" onClick=${() => this.saveChannelRules()}>
                                                Save Rules
                                            </button>
                                        </div>
                                    </div>
                                ` : html`
                                    <div class="card" style="text-align: center; padding: 60px;">
                                        <p class="text-gray">← Select a channel</p>
                                    </div>
                                `}
                            </div>
                        </div>
                    </div>
                `;
            }

            renderInvite() {
                const { channels, inviteSettings } = this.state;

                return html`
                    <div>
                        <h2 style="font-size: 28px; margin-bottom: 24px;">Invite Helper</h2>

                        <div class="card">
                            <label>Admin Channel</label>
                            <select value=${inviteSettings.admin_channel_id || ''}
                                onChange=${e => this.setState({ inviteSettings: { ...inviteSettings, admin_channel_id: e.target.value || null } })}>
                                <option value="">-- Select channel --</option>
                                ${channels.map(c => html`
                                    <option key=${c.id} value=${c.id}># ${c.name}</option>
                                `)}
                            </select>

                            <label>Audit Channel</label>
                            <select value=${inviteSettings.audit_channel_id || ''}
                                onChange=${e => this.setState({ inviteSettings: { ...inviteSettings, audit_channel_id: e.target.value || null } })}>
                                <option value="">-- Select channel --</option>
                                ${channels.map(c => html`
                                    <option key=${c.id} value=${c.id}># ${c.name}</option>
                                `)}
                            </select>

                            <label>Welcome DM Message</label>
                            <textarea rows="4" value=${inviteSettings.dm_message || ''}
                                onInput=${e => this.setState({ inviteSettings: { ...inviteSettings, dm_message: e.target.value } })}></textarea>

                            <div class="mt-4">
                                <button class="btn-primary" onClick=${() => this.saveInviteSettings()}>
                                    Save Settings
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }

            render() {
                const { page } = this.state;

                return html`
                    <div>
                        <${Toast} ref=${ref => this.toastRef = ref} />

                        <div class="sidebar">
                            <h1>ZEBRAS</h1>
                            <button class="nav-btn ${page === 'dashboard' ? 'active' : ''}"
                                onClick=${() => this.setState({ page: 'dashboard' })}>
                                Dashboard
                            </button>
                            <button class="nav-btn ${page === 'autoresponder' ? 'active' : ''}"
                                onClick=${() => this.setState({ page: 'autoresponder' }, () => this.loadRules())}>
                                Auto Responder
                            </button>
                            <button class="nav-btn ${page === 'rules' ? 'active' : ''}"
                                onClick=${() => this.setState({ page: 'rules' })}>
                                Channel Rules
                            </button>
                            <button class="nav-btn ${page === 'invite' ? 'active' : ''}"
                                onClick=${() => this.setState({ page: 'invite' }, () => this.loadInviteSettings())}>
                                Invite Helper
                            </button>
                        </div>

                        <div class="main">
                            ${page === 'dashboard' && this.renderDashboard()}
                            ${page === 'autoresponder' && this.renderAutoresponder()}
                            ${page === 'rules' && this.renderRules()}
                            ${page === 'invite' && this.renderInvite()}
                        </div>
                    </div>
                `;
            }
        }

        render(html`<${App} />`, document.getElementById('app'));
    </script>
</body>
</html>
